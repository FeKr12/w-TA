<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Work</title>

    <style>
        @font-face {
            font-family: "Bodoni72Oldstyle";
            src: url("fonts/Bodoni 72 Oldstyle Bold.otf") format("opentype");
            font-weight: 700;
            font-style: normal;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: white;
            color: #161218;
            font-family: "Bodoni72Oldstyle", "Bodoni 72", "Didot", serif;
            overflow-x: hidden;
        }

        .page {
            width: 100%;
            min-height: 100vh;
        }

        .hero {
            position: relative;
            height: auto;
            margin-bottom: -40px;
        }

        .hero-image {
            width: 100%;
            height: auto;
            display: block;
        }

        .content {
            position: relative;
            background: transparent;
            padding: 0px 60px 80px;
            min-height: 100vh;
        }

        .content-header {
            max-width: 1200px;
            margin: 0 auto 28px auto;
            display: flex;
            justify-content: flex-end;
            gap: 32px;
            margin-left: 14vw;
        }

        .top-nav {
            display: flex;
            justify-content: flex-end;
            gap: 34px;
            flex-wrap: wrap;
        }

        .nav-link {
            text-decoration: none;
            color: white;
            font-size: 2rem;
            line-height: 1;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

            .nav-link:hover {
                opacity: 0.7;
                transform: translateY(-1px);
            }

        .content-inner {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 36px;
        }

        .section-title {
            font-size: clamp(1.1rem, 1.8vw, 1.6rem);
            text-transform: uppercase;
            margin-bottom: 28px;
        }

        .body-text {
            max-width: 620px;
            font-size: clamp(0.95rem, 1.2vw, 1.1rem);
            line-height: 1.45;
        }

            .body-text p {
                margin-bottom: 22px;
            }

        .gallery-section {
            width: 100%;
            max-width: 760px;
            margin: 90px auto 0;
        }

        .gallery-tabs {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 2px;
            /*width: fit-content;*/
            margin: 0 auto 28px auto;
        }

        .gallery-tab {
            background: none;
            border: none;
            cursor: pointer;
            font-family: "Bodoni72Oldstyle", serif;
            font-size: clamp(1rem, 1.8vw, 1.4rem);
            line-height: 0.95;
            color: rgba(22, 18, 24, 0.35);
            text-align: left;
            transition: color 0.25s ease, opacity 0.25s ease, transform 0.25s ease;
        }

            .gallery-tab.active {
                color: #161218;
                transform: translateX(8px);
                opacity: 1;
            }

            .gallery-tab:hover {
                color: #161218;
            }

        .gallery {
            column-count: 3;
            column-gap: 18px;
            max-width: 760px;
            width: 100%;
            margin: 0 auto;
            transition: opacity 0.35s ease;
        }

            .gallery.fade-out {
                opacity: 0;
            }

            .gallery.fade-in {
                opacity: 1;
            }

            .gallery img {
                width: 100%;
                height: auto;
                display: block;
                margin-bottom: 18px;
                break-inside: avoid;
                cursor: pointer;
                transition: opacity 0.2s ease, transform 0.2s ease;
            }

                .gallery img:hover {
                    transform: scale(0.995);
                    opacity: 0.92;
                }

            #lightbox {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 1);
                z-index: 9999;
                align-items: center;
                justify-content: center;
            }

                #lightbox.active {
                    display: flex;
                }

            #lightbox-img {
                max-width: 90vw;
                max-height: 88vh;
                object-fit: contain;
                display: block;
            }

            .close {
                position: absolute;
                top: 20px;
                right: 28px;
                font-size: 2.2rem;
                color: white;
                cursor: pointer;
                line-height: 1;
            }

            .nav {
                position: absolute;
                top: 50%;
                transform: translateY(-50%);
                background: transparent;
                border: none;
                color: white;
                font-size: 2.4rem;
                cursor: pointer;
                padding: 12px;
            }

            .nav img {
                width: 150px;
                height: auto;

                opacity: 0.75;
                
                transition:
                    opacity 0.2s ease,
                    transform 0.2s ease;
            }

            .nav:hover img {
                opacity: 1;
                transform: scale(1.05);
            }

            .prev {
                left: 100px;
            }

            .next {
                right: 100px;
            }

            .prev img {
                transform: scaleX(-1)
            }

            .prev:hover img {
                transform: scaleX(-1) scale(1.05);
            }

            @media (max-width: 768px) {
                .hero {
                    margin-bottom: 0px;
                }

                .content {
                    padding: 22px 18px 44px;
                }

                .content-header {
                    /*margin-bottom: 20px;*/
                    justify-content: center;
                    margin-left: 0;
                }

                .top-nav {
                    justify-content: center;
                    width: 100%;
                    /*gap: 18px;*/
                }

                .nav-link {
                    color: black;
                    font-size: 1.6rem;
                }

                .gallery-section {
                    margin-top: 10px;
                }

                .gallery-tabs {
                    gap: 25px;
                    margin-bottom: 22px;
                }

                .gallery {
                    column-count: 2;
                    gap: 14px;
                }

                .prev {
                    position: relative;
                    bottom: 20px;
                    float: right;
                    transform: translateY(-20%);
                    padding: 0px 0px 0px;
                }

                .next {
                    position: relative;
                    bottom: 20px;
                    float: left;
                    transform: translateY(-20%);
                    padding: 0px 0px 0px;
                }

                .nav img {
                    width: 100px;
                }
            }
    </style>
</head>

<body>
    <main class="page">
        <section class="hero" aria-label="Work hero image">
            <img class="hero-image" src="images/bil2.jpg" alt="Work page hero image" />
        </section>

        <section class="content" id="work-content">
            <div class="content-header">
                <nav class="top-nav" aria-label="Huvudmeny">
                    <a class="nav-link" href="about.html">ABOUT</a>
                    <a class="nav-link" href="contact.html">CONTACT</a>
                    <a class="nav-link" href="index.html">HOME</a>
                </nav>
            </div>

            <div class="content-inner">

                <section class="gallery-section">
                    <div class="gallery-tabs">
                        <button class="gallery-tab active" data-gallery="1">THE MODELS</button>
                        <button class="gallery-tab" data-gallery="2">PREHISTORIC LIFE</button>
                        <button class="gallery-tab" data-gallery="0">THE EARTHLING CHRONICLES </button>
                    </div>

                    <div class="gallery fade-in" id="gallery"></div>
                </section>
            </div>
            </section>

            <div id="lightbox" onclick="closeImage(event)">
                <span class="close" onclick="closeImage(event)">×</span>
                <button class="nav prev" onclick="prevImage(event)">
                    <img src="images/point.png" alt="" />
                </button>
                <img id="lightbox-img" alt="Stor bild">
                <button class="nav next" onclick="nextImage(event)">
                    <img src="images/point.png" alt="" />
                </button>
            </div>
        </main>

        <script>
            const galleries = [
                [
                    "images/Earthling/Earthling1.jpg",
                    "images/Earthling/Earthling2.jpg",
                    "images/Earthling/Earthling3.jpg",
                    "images/Earthling/Earthling4.jpg",
                    "images/Earthling/Earthling5.jpg",
                    "images/Earthling/Earthling6.jpg",
                    "images/Earthling/Earthling7.jpg"
                ],
                [
                    "images/Models/Model1.jpg",
                    "images/Models/Model2.jpg",
                    "images/Models/Model3.jpg",
                    "images/Models/Model4.jpg",
                    "images/Models/Model5.jpg",
                    "images/Models/Model6.jpg"
                ],
                [
                    "images/Prehistoric/Prehistoric1.jpg",
                    "images/Prehistoric/Prehistoric2.jpg",
                    "images/Prehistoric/Prehistoric3.jpg",
                    "images/Prehistoric/Prehistoric4.jpg",
                    "images/Prehistoric/Prehistoric5.jpg",
                    "images/Prehistoric/Prehistoric6.jpg"
                ]
            ];

            const gallery = document.getElementById("gallery");
            const tabs = document.querySelectorAll(".gallery-tab");

            let currentGalleryIndex = 1;
            let currentImageIndex = 0;

            function renderGallery(index) {
                gallery.innerHTML = "";

                galleries[index].forEach((src, imageIndex) => {
                    const img = document.createElement("img");
                    img.src = src;
                    img.alt = `Bild ${imageIndex + 1}`;
                    img.onclick = () => openImage(imageIndex);
                    gallery.appendChild(img);
                });
            }

            tabs.forEach(tab => {
                tab.addEventListener("click", () => {
                    const newGalleryIndex = Number(tab.dataset.gallery);

                    if (newGalleryIndex === currentGalleryIndex) return;

                    gallery.classList.remove("fade-in");
                    gallery.classList.add("fade-out");

                    setTimeout(() => {
                        currentGalleryIndex = newGalleryIndex;

                        tabs.forEach(t => t.classList.remove("active"));
                        tab.classList.add("active");

                        renderGallery(currentGalleryIndex);

                        gallery.classList.remove("fade-out");
                        gallery.classList.add("fade-in");
                    }, 350);
                });
            });

            function openImage(index) {
                currentImageIndex = index;

                const lightbox = document.getElementById("lightbox");
                const lightboxImg = document.getElementById("lightbox-img");

                lightboxImg.src = galleries[currentGalleryIndex][currentImageIndex];
                lightbox.classList.add("active");
            }

            function closeImage(event) {
                if (
                    event.target.id === "lightbox" ||
                    event.target.classList.contains("close")
                ) {
                    document.getElementById("lightbox").classList.remove("active");
                }
            }

            function prevImage(event) {
                event.stopPropagation();

                const currentGallery = galleries[currentGalleryIndex];

                currentImageIndex =
                    (currentImageIndex - 1 + currentGallery.length) % currentGallery.length;

                document.getElementById("lightbox-img").src =
                    currentGallery[currentImageIndex];
            }

            function nextImage(event) {
                event.stopPropagation();

                const currentGallery = galleries[currentGalleryIndex];

                currentImageIndex =
                    (currentImageIndex + 1) % currentGallery.length;

                document.getElementById("lightbox-img").src =
                    currentGallery[currentImageIndex];
            }

            document.addEventListener("keydown", event => {
                const lightbox = document.getElementById("lightbox");

                if (!lightbox.classList.contains("active")) return;

                if (event.key === "Escape") {
                    lightbox.classList.remove("active");
                }

                if (event.key === "ArrowLeft") {
                    prevImage(event);
                }

                if (event.key === "ArrowRight") {
                    nextImage(event);
                }
            });

            renderGallery(currentGalleryIndex);

            window.addEventListener("load", () => {
                const target = document.getElementById("work-content");
                if (!target) return;

                const isMobile = window.matchMedia("(max-width: 768px)").matches;
                const offset = isMobile ? 75 : 250;

                const duration = isMobile ? 900 : 2400;

                function easeInOutSine(t) {
                    return -(Math.cos(Math.PI * t) - 1) / 2;
                }

                function smoothScrollTo(endY) {
                    const startY = window.scrollY;
                    const distance = endY - startY;
                    const startTime = performance.now();

                    function step(now) {
                        const elapsed = now - startTime;
                        const progress = Math.min(elapsed / duration, 1);
                        const eased = easeInOutSine(progress);

                        window.scrollTo(0, startY + distance * eased);

                        if (progress < 1) {
                            requestAnimationFrame(step);
                        }
                    }

                    requestAnimationFrame(step);
                }

                setTimeout(() => {
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            const endY =
                                target.getBoundingClientRect().top +
                                window.scrollY -
                                offset;

                            smoothScrollTo(endY);
                        });
                    });
                }, 100);
            });
        </script>
    </body>
    </html>
